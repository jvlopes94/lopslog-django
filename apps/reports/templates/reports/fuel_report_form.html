<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Fuel Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .container { max-width: 720px; }
        h1 { margin-bottom: 12px; }
        form { border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; }
        .errorlist { color: #b00020; margin: 4px 0; }
        button { padding: 10px 14px; border: 0; background: #0b5ed7; color: #fff; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>Generate Monthly Fuel Report</h1>
    <p>Select plate, period, and initial KM. The system will generate a downloadable PDF.</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="field">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        {% if form.non_field_errors %}
            <div class="errorlist">{{ form.non_field_errors }}</div>
        {% endif %}
        <button type="submit">Download PDF</button>
    </form>
</div>
</body>
</html>
